name: Deploy Portfolio to Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Debug Secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Server set: $([[ -n "$FTP_SERVER" ]] && echo YES || echo NO)"
          echo "Username set: $([[ -n "$FTP_USERNAME" ]] && echo YES || echo NO)"
          echo "Password set: $([[ -n "$FTP_PASSWORD" ]] && echo YES || echo NO)"
          echo "Server value length: ${#FTP_SERVER}"
          nc -zv $FTP_SERVER 21 || echo "Cannot reach port 21"

      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          set ftp:ssl-allow yes;
          set ftp:ssl-force no;
          set ftp:passive-mode yes;
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          mirror --reverse --delete --verbose --exclude .git --exclude .github --exclude README.md ./ /;
          bye
          " -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
